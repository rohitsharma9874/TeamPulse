<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPA & Co. — Team Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header" style="text-align:center;margin-bottom:28px">
                <div style="font-family:var(--font-head);font-size:28px;font-weight:700;color:var(--navy);display:flex;align-items:center;justify-content:center;gap:10px">
                    <svg width="40" height="40" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#8A6000;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#1B3A6B;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#0E2140;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect x="20" y="30" width="35" height="35" transform="rotate(45 37.5 47.5)" fill="none" stroke="url(#gradOrange)" stroke-width="15"/>
                        <rect x="45" y="30" width="35" height="35" transform="rotate(45 62.5 47.5)" fill="none" stroke="url(#gradRed)" stroke-width="15"/>
                    </svg>
                    KPA & Co.
                </div>
                <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--hint);margin-top:4px;font-weight:600">Team Tracker</div>
                <div style="width:48px;height:2px;background:var(--gold);margin:14px auto 0"></div>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <div id="error-msg" style="color: var(--status-overdue); margin-bottom: 15px; display: none; font-size: 14px;">Invalid credentials</div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <p style="color: var(--text-secondary); font-size: 14px;">
                    Don't have an account? <a href="#" id="showRegister" style="color: var(--accent-color); text-decoration: none;">Create Profile</a>
                </p>
            </div>
            
            <div style="margin-top: 30px; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 8px; font-size: 12px; color: var(--text-secondary);">
                <strong>Test Accounts:</strong><br>
                Admin: admin / password<br>
                Manager: srmanager / password<br>
                Trainee: trainee / password
            </div>
        </div>

        <!-- Registration Modal -->
        <div class="modal" id="registerModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Create Profile</h2>
                    <button class="close-btn" id="closeRegister">&times;</button>
                </div>
                <form id="registerForm">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="input-group">
                        <label>Role</label>
                        <select id="regRole">
                            <option value="admin">Admin</option>
                            <option value="sub-admin">Sub Admin</option>
                            <option value="manager">Manager</option>
                            <option value="trainee">Trainee</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Department</label>
                        <input type="text" id="regDept">
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
