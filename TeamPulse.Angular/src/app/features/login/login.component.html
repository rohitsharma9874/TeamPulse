<div class="login-page">
  <div class="login-card">
    <div class="logo">
      <span class="logo-tp">TP</span>
      <div class="logo-text">
        <h1>TeamPulse</h1>
        <p>Enter your company code to continue</p>
      </div>
    </div>

    <div class="timeout-notice" *ngIf="timeoutNotice">
      &#9432; You were signed out after 30 minutes of inactivity.
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Company Code</label>
        <input formControlName="tenantId" type="text" placeholder="e.g. KPA001" autocomplete="organization"
          style="text-transform:uppercase"
          (input)="form.get('tenantId')!.setValue($any($event.target).value.toUpperCase(), {emitEvent:false})" />
      </div>
      <div class="field">
        <label>Username</label>
        <input formControlName="username" type="text" placeholder="Enter username" autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input formControlName="password" [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter password" autocomplete="current-password" />
          <button type="button" class="pw-toggle" (click)="showPassword = !showPassword">
            <tp-icon [name]="showPassword ? 'eye-off' : 'eye'" [size]="16"></tp-icon>
          </button>
        </div>
      </div>
      <p class="error" *ngIf="error">{{ error }}</p>
      <div class="form-footer">
        <a class="forgot-link" routerLink="/forgot-password">Forgot password?</a>
      </div>
      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? loadingMessage : 'Sign In' }}
      </button>
    </form>

  </div>
</div>
