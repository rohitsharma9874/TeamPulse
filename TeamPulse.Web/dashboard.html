<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamPulse Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-container">
    <header class="topbar">
      <div>
        <h1>TeamPulse</h1>
        <p id="welcomeText">Welcome back</p>
      </div>
      <button id="logoutBtn" class="btn">Sign Out</button>
    </header>

    <section class="content">
      <div class="card">
        <h2>Active tasks</h2>
        <div id="taskList">Loading tasks...</div>
      </div>
    </section>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
