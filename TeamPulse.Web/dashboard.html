<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamPulse Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-container">
    <header class="topbar">
      <div>
        <h1>TeamPulse</h1>
        <p id="welcomeText">Welcome back</p>
      </div>
      <button id="logoutBtn" class="btn">Sign Out</button>
    </header>

    <section class="content">
      <div class="card">
        <h2>Create new task</h2>
        <form id="createTaskForm">
          <div class="input-group">
            <label for="taskTitle">Task Title *</label>
            <input id="taskTitle" type="text" placeholder="Enter task title" required>
          </div>
          <div class="input-group">
            <label for="taskDescription">Description *</label>
            <input id="taskDescription" type="text" placeholder="Enter task description" required>
          </div>
          <div class="input-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus" style="width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 12px;">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="input-group">
            <label for="taskDueDate">Due Date</label>
            <input id="taskDueDate" type="date">
          </div>
          <button type="submit" class="btn">Create Task</button>
        </form>
      </div>

      <div class="card">
        <h2>Active tasks</h2>
        <div id="taskList">Loading tasks...</div>
      </div>
    </section>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
