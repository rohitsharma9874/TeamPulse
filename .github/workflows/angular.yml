name: Angular — Build & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'TeamPulse.Angular/**'
      - '.github/workflows/angular.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'TeamPulse.Angular/**'

env:
  NODE_VERSION: '22.x'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: TeamPulse.Angular/package-lock.json

      - name: Install dependencies
        working-directory: TeamPulse.Angular
        run: npm ci --legacy-peer-deps

      - name: Build (production)
        working-directory: TeamPulse.Angular
        run: npx ng build --configuration production
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: angular-artifact
          path: TeamPulse.Angular/dist/team-pulse.angular/browser

  deploy:
    name: Deploy to Azure Static Web Apps (production)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-artifact
          path: ./dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './dist'
          skip_app_build: true
          output_location: ''
