name: Angular

on:
  push:
    branches: [main]
    paths:
      - 'TeamPulse.Angular/**'
      - '.github/workflows/angular.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'TeamPulse.Angular/**'
      - '.github/workflows/angular.yml'

env:
  NODE_VERSION: '22.x'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: TeamPulse.Angular/package-lock.json

      - name: Install dependencies
        working-directory: TeamPulse.Angular
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: TeamPulse.Angular
        run: npx ng build --configuration production
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: angular-artifact
          path: TeamPulse.Angular/dist/team-pulse.angular/browser

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-artifact
          path: ./dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get storage key
        run: |
          KEY=$(az storage account keys list \
            --account-name teampulsewebks \
            --resource-group teampulse-rg \
            --query "[0].value" -o tsv)
          echo "STORAGE_KEY=$KEY" >> $GITHUB_ENV

      - name: Clear existing files
        run: |
          az storage blob delete-batch \
            --account-name teampulsewebks \
            --source '$web' \
            --account-key ${{ env.STORAGE_KEY }} || true

      - name: Upload to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name teampulsewebks \
            --destination '$web' \
            --source ./dist \
            --account-key ${{ env.STORAGE_KEY }} \
            --overwrite
