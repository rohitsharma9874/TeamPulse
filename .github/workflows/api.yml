name: API

on:
  push:
    branches: [develop, main]
    paths:
      - 'TeamPulse.Api/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'TeamPulse.Api/**'
      - '.github/workflows/api.yml'

env:
  ACR_LOGIN_SERVER: teampulseacrks.azurecr.io
  RESOURCE_GROUP: teampulse-rg
  UPLOADS_MOUNT_PATH: /mnt/uploads
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: "587"
  SMTP_ENABLE_SSL: "true"
  SMTP_FROM_NAME: TeamPulse

jobs:

  # ── Build validation (always runs) ───────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build TeamPulse.Api/TeamPulse.WebApi/TeamPulse.WebApi.csproj --configuration Release

  # ── Deploy to Staging (develop push only, after build) ───────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/teampulse-api:staging-${{ github.sha }} ./TeamPulse.Api
          docker push ${{ env.ACR_LOGIN_SERVER }}/teampulse-api:staging-${{ github.sha }}

      - name: Configure ACR on staging Container App
        run: |
          az containerapp registry set \
            --name teampulse-api-staging \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ${{ env.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Deploy to staging
        run: |
          az containerapp update \
            --name teampulse-api-staging \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/teampulse-api:staging-${{ github.sha }} \
            --set-env-vars \
              "Storage__UploadsPath=${{ env.UPLOADS_MOUNT_PATH }}" \
              "Smtp__Host=${{ env.SMTP_HOST }}" \
              "Smtp__Port=${{ env.SMTP_PORT }}" \
              "Smtp__EnableSsl=${{ env.SMTP_ENABLE_SSL }}" \
              "Smtp__FromName=${{ env.SMTP_FROM_NAME }}" \
              "Smtp__Username=${{ secrets.SMTP_USERNAME }}" \
              "Smtp__Password=${{ secrets.SMTP_PASSWORD }}" \
              "Smtp__From=${{ secrets.SMTP_FROM }}" \
              "App__Url=${{ secrets.APP_URL_STAGING }}"

  # ── Deploy to Production (main push, requires manual approval) ────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/teampulse-api:${{ github.sha }} ./TeamPulse.Api
          docker push ${{ env.ACR_LOGIN_SERVER }}/teampulse-api:${{ github.sha }}

      - name: Configure ACR on production Container App
        run: |
          az containerapp registry set \
            --name teampulse-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ${{ env.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Deploy to production
        run: |
          az containerapp update \
            --name teampulse-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/teampulse-api:${{ github.sha }} \
            --set-env-vars \
              "Storage__UploadsPath=${{ env.UPLOADS_MOUNT_PATH }}" \
              "Smtp__Host=${{ env.SMTP_HOST }}" \
              "Smtp__Port=${{ env.SMTP_PORT }}" \
              "Smtp__EnableSsl=${{ env.SMTP_ENABLE_SSL }}" \
              "Smtp__FromName=${{ env.SMTP_FROM_NAME }}" \
              "Smtp__Username=${{ secrets.SMTP_USERNAME }}" \
              "Smtp__Password=${{ secrets.SMTP_PASSWORD }}" \
              "Smtp__From=${{ secrets.SMTP_FROM }}" \
              "App__Url=${{ secrets.APP_URL_PROD }}"
